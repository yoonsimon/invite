<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wedding Invitation</title>

  <!-- Open Graph (카카오톡 등 링크 미리보기) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="소중한 분들을 초대합니다">
  <meta property="og:description" content="귀한 걸음으로 축복해 주세요 · 4.18 규수당 문래점">
  <meta property="og:image" content="https://yoonsimon.github.io/invite/images/og-cover.jpg">
  <meta property="og:url" content="https://yoonsimon.github.io/invite/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="description" content="2027년 4월 18일 일요일 오전 11시 · 규수당 문래점">

  <!-- Favicon (반지 아이콘) + 모바일 메타 -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='13' cy='16' r='7.5' fill='none' stroke='%231a1a1a' stroke-width='2.4'/%3E%3Ccircle cx='19.5' cy='16' r='7.5' fill='none' stroke='%231a1a1a' stroke-width='2.4'/%3E%3C/svg%3E">
  <meta name="theme-color" content="#F8F8F8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="청첩장">
  <meta name="format-detection" content="telephone=no">

  <!-- Fonts: Space Grotesk (display) + IBM Plex Sans KR (UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

  <!-- Final styles -->
  <link rel="stylesheet" href="css/final.css?v=8">
</head>
<body>
  <div class="page">

  <!-- ===== 1. 커버 ===== -->
  <section id="cover" class="section cover">
    <div class="cover__overlay"></div>
    <p class="cover__eyebrow">Wedding Invitation</p>
    <div class="cover__content">
      <h1 class="cover__names">
        <span class="cover__groom"></span>
        <span class="cover__ampersand">&amp;</span>
        <span class="cover__bride"></span>
      </h1>
      <div class="cover__meta">
        <span class="cover__date">2027. 04. 18 일요일 오전 11시</span>
        <span class="cover__meta-dot">·</span>
        <span class="cover__venue">규수당 문래점</span>
      </div>
    </div>
    <div class="cover__scroll-hint">
      <div class="cover__arrow"></div>
    </div>
  </section>

  <!-- ===== 2. 인사말 ===== -->
  <section id="greeting" class="section greeting">
    <article class="post-card">
      <header class="post-card__header">
        <div class="post-card__avatar" aria-hidden="true">
          <svg viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="8" cy="11" r="5.5" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
            <circle cx="14" cy="11" r="5.5" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
          </svg>
        </div>
        <h2 class="section__title post-card__username">초대합니다</h2>
      </header>
      <div class="section__inner post-card__body">
        <p class="greeting__text"></p>
        <div class="greeting__names">
          <p></p>
          <p></p>
        </div>
      </div>
    </article>
  </section>

  <!-- ===== 3. 갤러리 ===== -->
  <section id="gallery" class="section gallery">
    <article class="post-card">
      <header class="post-card__header">
        <div class="post-card__avatar" aria-hidden="true">
          <svg viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="8" cy="11" r="5.5" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
            <circle cx="14" cy="11" r="5.5" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
          </svg>
        </div>
        <h2 class="section__title post-card__username">갤러리</h2>
      </header>
      <div class="section__inner post-card__body post-card__body--gallery">
        <!-- 메인 뷰어 -->
        <div class="swiper gallery__viewer" id="galleryViewer">
          <div class="swiper-wrapper">
            <!-- JS에서 동적 생성 -->
          </div>
          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>
        </div>
        <!-- 3열 인스타 그리드 -->
        <div class="gallery__grid" id="galleryGrid">
          <!-- JS에서 동적 생성 -->
        </div>
      </div>
    </article>
  </section>

  <!-- ===== 4. 예식 일시 ===== -->
  <section id="calendar" class="section calendar">
    <article class="post-card">
      <header class="post-card__header">
        <div class="post-card__avatar" aria-hidden="true">
          <svg viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="8" cy="11" r="5.5" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
            <circle cx="14" cy="11" r="5.5" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
          </svg>
        </div>
        <h2 class="section__title post-card__username">예식 일시</h2>
      </header>
      <div class="section__inner post-card__body">
        <p class="calendar__datetime">2027년 4월 18일 일요일 오전 11시</p>
        <div class="calendar__grid" id="calendarGrid">
          <!-- JS에서 동적 생성 -->
        </div>
        <div class="calendar__dday" id="dday"></div>
      </div>
    </article>
  </section>

  <!-- ===== 5. 오시는 길 ===== -->
  <section id="location" class="section location">
    <article class="post-card">
      <header class="post-card__header">
        <div class="post-card__avatar" aria-hidden="true">
          <svg viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="8" cy="11" r="5.5" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
            <circle cx="14" cy="11" r="5.5" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
          </svg>
        </div>
        <h2 class="section__title post-card__username">오시는 길</h2>
      </header>
      <div class="section__inner post-card__body">
        <p class="location__venue-name">규수당 문래점</p>
        <p class="location__address" id="venueAddress">서울 영등포구 문래로 164 SK리더스뷰 2층</p>

        <div class="location__map" id="map"></div>

        <button class="location__copy-btn" id="copyAddressBtn">주소 복사</button>

        <div class="location__nav-buttons">
          <a class="location__nav-btn location__nav-btn--kakao" id="naviKakao" href="#" target="_blank" rel="noopener">
            <svg class="location__nav-icon" viewBox="0 0 28 28" aria-hidden="true">
              <rect width="28" height="28" rx="7" fill="#FEE500"/>
              <path d="M14 7.5c-2.4 0-4.3 1.9-4.3 4.3 0 3.2 4.3 8.2 4.3 8.2s4.3-5 4.3-8.2c0-2.4-1.9-4.3-4.3-4.3z" fill="#3A1D1D"/>
              <circle cx="14" cy="11.8" r="1.6" fill="#FEE500"/>
            </svg>
            카카오맵
          </a>
          <a class="location__nav-btn location__nav-btn--naver" id="naviNaver" href="#" target="_blank" rel="noopener">
            <svg class="location__nav-icon" viewBox="0 0 28 28" aria-hidden="true">
              <rect width="28" height="28" rx="7" fill="#03C75A"/>
              <path d="M10 19V9l8 10V9" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            네이버지도
          </a>
          <a class="location__nav-btn location__nav-btn--tmap" id="naviTmap" href="#" target="_blank" rel="noopener">
            <svg class="location__nav-icon" viewBox="0 0 28 28" aria-hidden="true">
              <rect width="28" height="28" rx="7" fill="#F2F2F2" stroke="#E2E2E2"/>
              <path d="M8.5 10h11M14 10v9" fill="none" stroke="#1A1A1A" stroke-width="2.6" stroke-linecap="round"/>
            </svg>
            티맵
          </a>
        </div>
      </div>
    </article>
  </section>

  <!-- ===== 6. 방명록 ===== -->
  <section id="guestbook" class="section guestbook">
    <article class="post-card">
      <header class="post-card__header">
        <div class="post-card__avatar" aria-hidden="true">
          <svg viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="8" cy="11" r="5.5" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
            <circle cx="14" cy="11" r="5.5" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
          </svg>
        </div>
        <h2 class="section__title post-card__username">방명록</h2>
      </header>
      <div class="section__inner post-card__body">
        <form class="guestbook__form" id="guestbookForm">
          <div class="guestbook__row">
            <input type="text" id="gbName" placeholder="이름" maxlength="10" required>
            <input type="password" id="gbPassword" placeholder="비밀번호" maxlength="10" required>
          </div>
          <textarea id="gbMessage" placeholder="축하 메시지를 남겨주세요" maxlength="200" required></textarea>
          <button type="submit" class="guestbook__submit">등록</button>
        </form>
        <ul class="guestbook__list" id="guestbookList">
          <!-- JS에서 동적 생성 -->
        </ul>
      </div>
    </article>
  </section>

  <!-- ===== 7. 마음 전하기 ===== -->
  <section id="account" class="section account">
    <article class="post-card">
      <header class="post-card__header">
        <div class="post-card__avatar" aria-hidden="true">
          <svg viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="8" cy="11" r="5.5" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
            <circle cx="14" cy="11" r="5.5" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
          </svg>
        </div>
        <h2 class="section__title post-card__username">마음 전하기</h2>
      </header>
      <div class="section__inner post-card__body">
        <p class="account__subtitle">축하의 마음을 전해주세요</p>

        <div class="account__group">
          <button class="account__toggle" data-target="groomAccounts">
            신랑측 계좌번호 <span class="account__arrow">▼</span>
          </button>
          <div class="account__details" id="groomAccounts">
            <!-- JS에서 동적 생성 -->
          </div>
        </div>

        <div class="account__group">
          <button class="account__toggle" data-target="brideAccounts">
            신부측 계좌번호 <span class="account__arrow">▼</span>
          </button>
          <div class="account__details" id="brideAccounts">
            <!-- JS에서 동적 생성 -->
          </div>
        </div>
      </div>
    </article>
  </section>

  <!-- ===== 푸터 ===== -->
  <footer class="footer">
    <button type="button" class="share-btn" id="kakaoShareBtn">
      <svg class="share-btn__icon" viewBox="0 0 28 28" aria-hidden="true">
        <rect width="28" height="28" rx="7" fill="#FEE500"/>
        <path d="M14 7.2c-3.7 0-6.7 2.3-6.7 5.2 0 1.9 1.3 3.5 3.2 4.4-.1.5-.5 1.8-.6 2.1-.1.4.1.4.3.3.2-.1 2.1-1.4 2.9-2 .3.04.6.05.9.05 3.7 0 6.7-2.3 6.7-5.2S17.7 7.2 14 7.2z" fill="#3A1D1D"/>
      </svg>
      카카오톡으로 공유하기
    </button>
    <p>Thank you for celebrating with us</p>
  </footer>
  </div><!-- /.page -->

  <!-- 플로팅 카카오톡 공유 (항상 노출) -->
  <button type="button" class="share-float" id="kakaoShareFloat" aria-label="카카오톡으로 공유하기">
    <svg class="share-float__icon" viewBox="0 0 28 28" aria-hidden="true">
      <rect width="28" height="28" rx="7" fill="#FEE500"/>
      <path d="M14 7.2c-3.7 0-6.7 2.3-6.7 5.2 0 1.9 1.3 3.5 3.2 4.4-.1.5-.5 1.8-.6 2.1-.1.4.1.4.3.3.2-.1 2.1-1.4 2.9-2 .3.04.6.05.9.05 3.7 0 6.7-2.3 6.7-5.2S17.7 7.2 14 7.2z" fill="#3A1D1D"/>
    </svg>
    <span class="share-float__label">카카오톡으로 공유하기</span>
  </button>

  <!-- Scripts (순서 고정) -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/firebase-init.js"></script>
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=f8bba6bb7016e10cec2ab6108eda3f94"></script>
  <script src="js/gallery.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/location.js"></script>
  <script src="js/guestbook.js"></script>
  <script src="js/account.js"></script>
  <script src="js/secret.js"></script>
  <script src="js/main.js"></script>
  <script src="js/share.js?v=7"></script>
</body>
</html>
